<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>mdview</title>
  <link rel="stylesheet" href="/vendor/molstar/molstar.css" />
  <style>
    :root { color-scheme: dark; }
    * { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; font: 14px system-ui, sans-serif; }
    #layout { display: flex; height: 100vh; }
    #sidebar {
      width: 280px; flex: 0 0 280px; background: #1b1d23; color: #d7dae0;
      border-right: 1px solid #2c2f38; display: flex; flex-direction: column;
    }
    #sidebar h1 { font-size: 15px; margin: 0; padding: 12px 14px; border-bottom: 1px solid #2c2f38; }
    #sidebar h1 small { color: #8b909a; font-weight: normal; }
    #root-label { padding: 8px 14px 2px; color: #8b909a; font-size: 11px; word-break: break-all; }
    #breadcrumb { padding: 2px 14px 8px; font-size: 12px; word-break: break-all;
      border-bottom: 1px solid #2c2f38; }
    #breadcrumb .crumb { color: #89b4fa; cursor: pointer; }
    #breadcrumb .crumb:hover { text-decoration: underline; }
    #breadcrumb .crumb-sep { color: #555b66; }
    ul.file-list li.folder { color: #e6c07b; }
    #empty-note { padding: 10px 14px; color: #8b909a; font-size: 12px; }
    #lists { overflow-y: auto; flex: 1; }
    .section-head { padding: 10px 14px 4px; color: #8b909a; font-size: 11px;
      text-transform: uppercase; letter-spacing: 0.04em; border-top: 1px solid #2c2f38; }
    ul.file-list { list-style: none; margin: 0; padding: 0; }
    ul.file-list li {
      padding: 7px 14px; cursor: pointer; border-bottom: 1px solid #23262e;
      display: flex; justify-content: space-between; gap: 8px;
    }
    ul.file-list li:hover { background: #262932; }
    ul.file-list li.active { background: #2f3340; color: #fff; }
    ul.file-list .fmt { color: #8b909a; font-size: 11px; text-transform: uppercase; flex: 0 0 auto; }
    ul.file-list .name { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .topo { padding: 7px 14px; border-bottom: 1px solid #23262e; }
    .topo .name { display: flex; justify-content: space-between; gap: 8px; }
    .topo .name span:first-child { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .topo .pair { display: flex; gap: 6px; margin-top: 5px; }
    .topo select { flex: 1; min-width: 0; background: #14161b; color: #d7dae0;
      border: 1px solid #2c2f38; border-radius: 3px; padding: 3px; font-size: 12px; }
    .topo button { background: #3a3f4d; color: #fff; border: none; border-radius: 3px;
      padding: 3px 9px; cursor: pointer; font-size: 12px; }
    .topo button:hover { background: #474d5e; }
    .topo button:disabled { opacity: 0.5; cursor: not-allowed; }
    .traj { padding: 7px 14px; }
    .traj .row { display: flex; align-items: center; gap: 6px; margin-bottom: 5px; }
    .traj label { color: #8b909a; font-size: 11px; flex: 0 0 42px; }
    .traj select { flex: 1; min-width: 0; background: #14161b; color: #d7dae0;
      border: 1px solid #2c2f38; border-radius: 3px; padding: 3px; font-size: 12px; }
    .traj button { width: 100%; background: #3a4d3f; color: #fff; border: none;
      border-radius: 3px; padding: 5px 9px; cursor: pointer; font-size: 12px; }
    .traj button:hover { background: #47604e; }
    .traj button:disabled { opacity: 0.5; cursor: not-allowed; }
    #proc-options { margin: 4px 0 8px; padding: 6px 0; border-top: 1px solid #23262e; }
    .traj input[type=number], .traj input[type=text] { flex: 1; min-width: 0;
      background: #14161b; color: #d7dae0; border: 1px solid #2c2f38;
      border-radius: 3px; padding: 3px; font-size: 12px; }
    .traj label.chk { flex: 1; color: #c4c8d0; display: flex; align-items: center;
      gap: 6px; cursor: pointer; }
    .traj label.chk input { flex: 0 0 auto; }
    #proc-note { color: #d98b8b; font-size: 11px; padding: 2px 0; min-height: 0; }
    #proc-note.ok { color: #8b909a; }
    #render-panel { border-top: 1px solid #2c2f38; padding: 8px 14px; }
    #render-panel .section-head { padding: 0 0 6px; border-top: none; }
    #render-controls { display: flex; gap: 6px; align-items: center; margin-bottom: 6px; }
    #render-res, #render-name { background: #14161b; color: #d7dae0;
      border: 1px solid #2c2f38; border-radius: 3px; padding: 3px; font-size: 12px; }
    #render-name { flex: 1; min-width: 0; }
    #render-btn { width: 100%; background: #3a3f4d; color: #fff; border: none;
      border-radius: 3px; padding: 5px 9px; cursor: pointer; font-size: 12px; }
    #render-btn:hover { background: #474d5e; }
    #render-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    #render-note { color: #8b909a; font-size: 11px; padding: 3px 0 0; }
    #render-gallery { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 6px;
      max-height: 124px; overflow-y: auto; }
    #render-gallery a img { width: 54px; height: 54px; object-fit: cover; display: block;
      border: 1px solid #2c2f38; border-radius: 3px; }
    #render-gallery a:hover img { border-color: #89b4fa; }
    #status { padding: 8px 14px; color: #8b909a; font-size: 12px; border-top: 1px solid #2c2f38; }
    #viewer { position: relative; flex: 1; min-width: 0; }
  </style>
</head>
<body>
  <div id="layout">
    <aside id="sidebar">
      <h1>mdview <small>MD viewer</small></h1>
      <div id="root-label">loading…</div>
      <div id="breadcrumb"></div>
      <div id="lists">
        <ul id="folder-list" class="file-list"></ul>
        <div id="files-section" hidden>
          <div class="section-head">Structures</div>
          <ul id="file-list" class="file-list"></ul>
        </div>
        <div id="topo-section" hidden>
          <div class="section-head">Topologies (pair with coordinates)</div>
          <div id="topo-list"></div>
        </div>
        <div id="traj-section" hidden>
          <div class="section-head">Trajectories (model + coordinates)</div>
          <div class="traj">
            <div class="row"><label for="traj-model">model</label>
              <select id="traj-model"></select></div>
            <div class="row"><label for="traj-coords">traj</label>
              <select id="traj-coords"></select></div>
            <div id="proc-options">
              <div class="row"><label for="proc-stride">stride</label>
                <input id="proc-stride" type="number" min="1" step="1" value="1"></div>
              <div class="row"><label class="chk"><input id="proc-strip" type="checkbox">
                strip solvent (water + ions)</label></div>
              <div class="row"><label for="proc-select">select</label>
                <input id="proc-select" type="text" placeholder="MDAnalysis selection (default: all)"></div>
              <div class="row"><label class="chk"><input id="proc-align" type="checkbox">
                align to first frame</label></div>
              <div class="row"><label for="proc-align-sel">fit on</label>
                <input id="proc-align-sel" type="text" placeholder="backbone"></div>
              <div id="proc-note"></div>
            </div>
            <button id="traj-load">▶ Load &amp; play</button>
          </div>
        </div>
        <div id="empty-note" hidden>No loadable files in this folder.</div>
      </div>
      <div id="render-panel">
        <div class="section-head">Render</div>
        <div id="render-controls">
          <select id="render-res" title="supersampling">
            <option value="1">1×</option>
            <option value="2" selected>2×</option>
            <option value="4">4×</option>
          </select>
          <input id="render-name" type="text" placeholder="filename (auto)">
        </div>
        <button id="render-btn">📷 Render to server</button>
        <div id="render-note"></div>
        <div id="render-gallery"></div>
      </div>
      <div id="status">Browsing…</div>
    </aside>
    <main id="viewer"></main>
  </div>
  <script src="/vendor/molstar/molstar.js"></script>
  <script src="/app.js"></script>
</body>
</html>
