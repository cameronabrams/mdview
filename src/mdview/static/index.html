<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>mdview</title>
  <link rel="stylesheet" href="/vendor/molstar/molstar.css" />
  <style>
    :root { color-scheme: dark; }
    * { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; font: 14px system-ui, sans-serif; }
    #layout { display: flex; height: 100vh; }
    #sidebar {
      width: 280px; flex: 0 0 280px; background: #1b1d23; color: #d7dae0;
      border-right: 1px solid #2c2f38; display: flex; flex-direction: column;
    }
    #sidebar h1 { font-size: 15px; margin: 0; padding: 12px 14px; border-bottom: 1px solid #2c2f38; }
    #sidebar h1 small { color: #8b909a; font-weight: normal; }
    #root-label { padding: 8px 14px; color: #8b909a; font-size: 12px; word-break: break-all; }
    #lists { overflow-y: auto; flex: 1; }
    .section-head { padding: 10px 14px 4px; color: #8b909a; font-size: 11px;
      text-transform: uppercase; letter-spacing: 0.04em; border-top: 1px solid #2c2f38; }
    ul.file-list { list-style: none; margin: 0; padding: 0; }
    ul.file-list li {
      padding: 7px 14px; cursor: pointer; border-bottom: 1px solid #23262e;
      display: flex; justify-content: space-between; gap: 8px;
    }
    ul.file-list li:hover { background: #262932; }
    ul.file-list li.active { background: #2f3340; color: #fff; }
    ul.file-list .fmt { color: #8b909a; font-size: 11px; text-transform: uppercase; flex: 0 0 auto; }
    ul.file-list .name { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .topo { padding: 7px 14px; border-bottom: 1px solid #23262e; }
    .topo .name { display: flex; justify-content: space-between; gap: 8px; }
    .topo .name span:first-child { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .topo .pair { display: flex; gap: 6px; margin-top: 5px; }
    .topo select { flex: 1; min-width: 0; background: #14161b; color: #d7dae0;
      border: 1px solid #2c2f38; border-radius: 3px; padding: 3px; font-size: 12px; }
    .topo button { background: #3a3f4d; color: #fff; border: none; border-radius: 3px;
      padding: 3px 9px; cursor: pointer; font-size: 12px; }
    .topo button:hover { background: #474d5e; }
    .topo button:disabled { opacity: 0.5; cursor: not-allowed; }
    .traj { padding: 7px 14px; }
    .traj .row { display: flex; align-items: center; gap: 6px; margin-bottom: 5px; }
    .traj label { color: #8b909a; font-size: 11px; flex: 0 0 42px; }
    .traj select { flex: 1; min-width: 0; background: #14161b; color: #d7dae0;
      border: 1px solid #2c2f38; border-radius: 3px; padding: 3px; font-size: 12px; }
    .traj button { width: 100%; background: #3a4d3f; color: #fff; border: none;
      border-radius: 3px; padding: 5px 9px; cursor: pointer; font-size: 12px; }
    .traj button:hover { background: #47604e; }
    .traj button:disabled { opacity: 0.5; cursor: not-allowed; }
    #status { padding: 8px 14px; color: #8b909a; font-size: 12px; border-top: 1px solid #2c2f38; }
    #viewer { position: relative; flex: 1; min-width: 0; }
  </style>
</head>
<body>
  <div id="layout">
    <aside id="sidebar">
      <h1>mdview <small>MD viewer</small></h1>
      <div id="root-label">loading…</div>
      <div id="lists">
        <div id="files-section" hidden>
          <div class="section-head">Structures</div>
          <ul id="file-list" class="file-list"></ul>
        </div>
        <div id="topo-section" hidden>
          <div class="section-head">Topologies (pair with coordinates)</div>
          <div id="topo-list"></div>
        </div>
        <div id="traj-section" hidden>
          <div class="section-head">Trajectories (model + coordinates)</div>
          <div class="traj">
            <div class="row"><label for="traj-model">model</label>
              <select id="traj-model"></select></div>
            <div class="row"><label for="traj-coords">traj</label>
              <select id="traj-coords"></select></div>
            <button id="traj-load">▶ Load &amp; play</button>
          </div>
        </div>
      </div>
      <div id="status">Select a structure to load.</div>
    </aside>
    <main id="viewer"></main>
  </div>
  <script src="/vendor/molstar/molstar.js"></script>
  <script src="/app.js"></script>
</body>
</html>
